services:
  postgres:
    # pgvector on Postgres 18 (Debian trixie). PG18 stores its cluster at
    # /var/lib/postgresql (not /var/lib/postgresql/data), so the volume mounts there.
    image: pgvector/pgvector:pg18-trixie
    environment:
      POSTGRES_USER: copilot
      POSTGRES_PASSWORD: copilot
      POSTGRES_DB: copilot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U copilot -d copilot"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    # Secrets (OPENAI_API_KEY, TAVILY_API_KEY) come from backend/.env via env_file.
    # The values below intentionally override that file: DATABASE_URL must point at
    # the in-network `postgres` host (not the .env's localhost), and CORS_ORIGINS is
    # fixed for compose. Compose ranks `environment` above `env_file`, so do NOT also
    # list the API keys here or they'd shadow .env with empty strings.
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://copilot:copilot@postgres:5432/copilot
      CORS_ORIGINS: '["http://localhost:5173","http://localhost:4173"]'
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  pgdata:
